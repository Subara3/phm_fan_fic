<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>PROJECT HAIL MARY - Eridian Memory</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="starfield"></div>

<header class="topbar">
  <div class="brand">
    <span class="brand-main">PROJECT <b>HAIL MARY</b></span>
    <span class="brand-sub" data-i18n="brandSub">Eridian Memory</span>
    <span class="brand-mode" data-i18n="modeEndless">ENDLESS</span>
  </div>
  <div class="topbar-actions">
    <button id="menu-btn" class="btn ghost" data-i18n="menu">MENU</button>
    <label class="speed-label">
      <span class="speed-text" data-i18n="speed">速度</span>
      <select id="speed" aria-label="speed">
        <option value="900" data-i18n="speedSlow">ゆっくり</option>
        <option value="650" selected data-i18n="speedNormal">ふつう</option>
        <option value="450" data-i18n="speedFast">はやい</option>
      </select>
    </label>
    <button id="toggle-btn" class="btn primary" data-action="start">START</button>
  </div>
</header>

<main class="game-root">

  <section class="rocky-stage" aria-label="ロッキー">
    <div class="arrow-flash" id="arrow-flash"></div>
    <svg class="rocky" viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rocky the Eridian">
      <ellipse cx="250" cy="555" rx="180" ry="16" fill="#000" opacity="0.5"/>

      <!-- BC: smallest, thin center leg, single ring, minimal detail -->
      <g class="leg" id="leg-BC" transform="translate(250 250)">
        <g class="hip">
          <line x1="0" y1="0" x2="0" y2="52" stroke="#0a0503" stroke-width="13" stroke-linecap="round"/>
          <line x1="0" y1="2" x2="0" y2="50" stroke="#38251a" stroke-width="9" stroke-linecap="round"/>
          <ellipse cx="0" cy="22" rx="5" ry="1.6" fill="none" stroke="#0a0503" stroke-width="1" opacity="0.7"/>
          <circle cx="0" cy="55" r="6" fill="#0a0503"/>
          <circle cx="0" cy="55" r="3.8" fill="#3a2716"/>
          <g class="knee" transform="translate(0 55)">
            <line x1="0" y1="0" x2="0" y2="52" stroke="#0a0503" stroke-width="11" stroke-linecap="round"/>
            <line x1="0" y1="2" x2="0" y2="50" stroke="#36241a" stroke-width="8" stroke-linecap="round"/>
            <ellipse cx="0" cy="25" rx="4.5" ry="1.5" fill="none" stroke="#0a0503" stroke-width="1" opacity="0.7"/>
            <circle cx="0" cy="55" r="4.8" fill="#0a0503"/>
            <circle cx="0" cy="55" r="3" fill="#3a2716"/>
            <g class="foot" transform="translate(0 55)">
              <polygon points="-7,-2 -11,8 -3,8" fill="#1f1308" stroke="#0a0503" stroke-width="1"/>
              <polygon points="0,-2 -2,10 3,10" fill="#1f1308" stroke="#0a0503" stroke-width="1"/>
              <polygon points="8,-2 11,8 4,7" fill="#1f1308" stroke="#0a0503" stroke-width="1"/>
            </g>
          </g>
        </g>
      </g>

      <!-- BL: stout weight-bearing leg, tight ring spacing, thick plates -->
      <g class="leg" id="leg-BL" transform="translate(210 275)">
        <g class="hip">
          <line x1="0" y1="0" x2="0" y2="77" stroke="#0a0503" stroke-width="20" stroke-linecap="round"/>
          <line x1="0" y1="3" x2="0" y2="74" stroke="#4e3422" stroke-width="15" stroke-linecap="round"/>
          <line x1="-3.5" y1="8" x2="-3.5" y2="66" stroke="#9a7450" stroke-width="1.6" stroke-linecap="round" opacity="0.45"/>
          <ellipse cx="0" cy="22" rx="8.5" ry="2.6" fill="none" stroke="#0a0503" stroke-width="1.4" opacity="0.72"/>
          <ellipse cx="0" cy="42" rx="8.5" ry="2.6" fill="none" stroke="#0a0503" stroke-width="1.4" opacity="0.72"/>
          <circle cx="4" cy="60" r="1.6" fill="#0a0503" opacity="0.55"/>
          <circle cx="0" cy="80" r="9" fill="#0a0503"/>
          <circle cx="0" cy="80" r="6" fill="#3d2718"/>
          <circle cx="-1.5" cy="78.5" r="1.5" fill="#7a5432" opacity="0.7"/>
          <g class="knee" transform="translate(0 80)">
            <line x1="0" y1="0" x2="0" y2="72" stroke="#0a0503" stroke-width="18" stroke-linecap="round"/>
            <line x1="0" y1="3" x2="0" y2="69" stroke="#4a3020" stroke-width="13" stroke-linecap="round"/>
            <line x1="-2.5" y1="8" x2="-2.5" y2="62" stroke="#9a7450" stroke-width="1.3" stroke-linecap="round" opacity="0.42"/>
            <ellipse cx="0" cy="20" rx="7" ry="2.2" fill="none" stroke="#0a0503" stroke-width="1.2" opacity="0.72"/>
            <ellipse cx="0" cy="45" rx="7" ry="2.2" fill="none" stroke="#0a0503" stroke-width="1.2" opacity="0.72"/>
            <circle cx="0" cy="75" r="7" fill="#0a0503"/>
            <circle cx="0" cy="75" r="4.8" fill="#3d2718"/>
            <!-- BL hand: medium -->
            <g class="foot" transform="translate(0 75)">
              <polygon points="-14,-2 -21,16 -6,13"  fill="#231508" stroke="#0a0503" stroke-width="1.25"/>
              <polygon points="0,-2 -5,19 5,19"       fill="#231508" stroke="#0a0503" stroke-width="1.25"/>
              <polygon points="14,-2 21,16 6,13"      fill="#231508" stroke="#0a0503" stroke-width="1.25"/>
            </g>
          </g>
        </g>
      </g>

      <!-- BR: slender stepper, wider ring spacing, slightly narrower -->
      <g class="leg" id="leg-BR" transform="translate(290 275)">
        <g class="hip">
          <line x1="0" y1="0" x2="0" y2="77" stroke="#0a0503" stroke-width="18" stroke-linecap="round"/>
          <line x1="0" y1="3" x2="0" y2="74" stroke="#462e1c" stroke-width="13" stroke-linecap="round"/>
          <line x1="-2.8" y1="8" x2="-2.8" y2="66" stroke="#8a6840" stroke-width="1.4" stroke-linecap="round" opacity="0.42"/>
          <ellipse cx="0" cy="30" rx="7.5" ry="2.4" fill="none" stroke="#0a0503" stroke-width="1.2" opacity="0.68"/>
          <ellipse cx="0" cy="58" rx="7.5" ry="2.3" fill="none" stroke="#0a0503" stroke-width="1.1" opacity="0.55"/>
          <circle cx="0" cy="80" r="7.5" fill="#0a0503"/>
          <circle cx="0" cy="80" r="5" fill="#38261a"/>
          <circle cx="-1.2" cy="78.5" r="1.2" fill="#7a5432" opacity="0.65"/>
          <g class="knee" transform="translate(0 80)">
            <line x1="0" y1="0" x2="0" y2="72" stroke="#0a0503" stroke-width="15" stroke-linecap="round"/>
            <line x1="0" y1="3" x2="0" y2="69" stroke="#46301c" stroke-width="11" stroke-linecap="round"/>
            <line x1="-2.2" y1="8" x2="-2.2" y2="62" stroke="#8a6840" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
            <ellipse cx="0" cy="30" rx="6.5" ry="2.1" fill="none" stroke="#0a0503" stroke-width="1.1" opacity="0.65"/>
            <circle cx="0" cy="75" r="6.2" fill="#0a0503"/>
            <circle cx="0" cy="75" r="4.2" fill="#38261a"/>
            <!-- BR hand: small (compact stepper) -->
            <g class="foot" transform="translate(0 75)">
              <polygon points="-9,-2 -14,11 -4,9"   fill="#231508" stroke="#0a0503" stroke-width="1.1"/>
              <polygon points="0,-2 -3,13 3,13"     fill="#231508" stroke="#0a0503" stroke-width="1.1"/>
              <polygon points="9,-2 14,11 4,9"      fill="#231508" stroke="#0a0503" stroke-width="1.1"/>
            </g>
          </g>
        </g>
      </g>

      <g class="body" id="body" transform="translate(250 280)">
        <path d="M -75 40 L -85 -20 L 0 -60 L 85 -20 L 75 40 Z"
              fill="#5a3e28" stroke="#1a0f07" stroke-width="4" stroke-linejoin="round"/>
        <path d="M 0 -60 L 0 40
                 M -85 -20 L 0 0 L 85 -20"
              stroke="#2a1a0d" stroke-width="2" fill="none" opacity="0.7"/>
        <circle cx="-40" cy="10" r="3" fill="#2a1a0d"/>
        <circle cx="35" cy="-5" r="2.5" fill="#2a1a0d"/>
        <circle cx="-10" cy="25" r="2" fill="#2a1a0d"/>
        <circle cx="50" cy="20" r="2.5" fill="#2a1a0d"/>

        <!-- 5 breathing pores on top of the carapace itself -->
        <g fill="#1a0f07">
          <ellipse cx="-18" cy="-42" rx="2.6" ry="1.4"/>
          <ellipse cx="-9"  cy="-50" rx="2.6" ry="1.4"/>
          <ellipse cx="0"   cy="-54" rx="2.6" ry="1.4"/>
          <ellipse cx="9"   cy="-50" rx="2.6" ry="1.4"/>
          <ellipse cx="18"  cy="-42" rx="2.6" ry="1.4"/>
        </g>
      </g>

      <!-- FL: dominant/expressive arm — chunky, 3 plate marks, crisp highlight -->
      <g class="leg" id="leg-FL" transform="translate(185 320)">
        <g class="hip">
          <line x1="0" y1="0" x2="0" y2="82" stroke="#0a0503" stroke-width="24" stroke-linecap="round"/>
          <line x1="0" y1="3" x2="0" y2="79" stroke="#5c3d26" stroke-width="19" stroke-linecap="round"/>
          <line x1="-4.5" y1="8" x2="-4.5" y2="72" stroke="#a07852" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
          <ellipse cx="0" cy="22" rx="10.5" ry="3" fill="none" stroke="#0a0503" stroke-width="1.6" opacity="0.75"/>
          <ellipse cx="0" cy="45" rx="10.5" ry="3" fill="none" stroke="#0a0503" stroke-width="1.6" opacity="0.72"/>
          <ellipse cx="0" cy="68" rx="10" ry="2.8" fill="none" stroke="#0a0503" stroke-width="1.4" opacity="0.6"/>
          <circle cx="0" cy="85" r="11" fill="#0a0503"/>
          <circle cx="0" cy="85" r="7.2" fill="#402a18"/>
          <circle cx="-2.2" cy="83" r="2.2" fill="#7a5432" opacity="0.75"/>
          <g class="knee" transform="translate(0 85)">
            <line x1="0" y1="0" x2="0" y2="82" stroke="#0a0503" stroke-width="21" stroke-linecap="round"/>
            <line x1="0" y1="3" x2="0" y2="79" stroke="#5c3d26" stroke-width="16" stroke-linecap="round"/>
            <line x1="-3.2" y1="8" x2="-3.2" y2="70" stroke="#a07852" stroke-width="1.9" stroke-linecap="round" opacity="0.55"/>
            <ellipse cx="0" cy="24" rx="9.5" ry="2.7" fill="none" stroke="#0a0503" stroke-width="1.5" opacity="0.72"/>
            <ellipse cx="0" cy="50" rx="9.5" ry="2.7" fill="none" stroke="#0a0503" stroke-width="1.5" opacity="0.72"/>
            <circle cx="0" cy="85" r="9" fill="#0a0503"/>
            <circle cx="0" cy="85" r="5.8" fill="#402a18"/>
            <circle cx="-1.5" cy="83.5" r="1.5" fill="#7a5432" opacity="0.7"/>
            <!-- FL hand: largest / dominant -->
            <g class="foot" transform="translate(0 85)">
              <polygon points="-17,-3 -27,24 -7,17"  fill="#2a1a0d" stroke="#0a0503" stroke-width="1.6"/>
              <polygon points="0,-3 -7,30 8,30"       fill="#2a1a0d" stroke="#0a0503" stroke-width="1.6"/>
              <polygon points="17,-3 27,24 8,17"      fill="#2a1a0d" stroke="#0a0503" stroke-width="1.6"/>
            </g>
          </g>
        </g>
      </g>

      <!-- FR: slightly slimmer, 2 rings wider apart, small chip near mid-upper -->
      <g class="leg" id="leg-FR" transform="translate(315 320)">
        <g class="hip">
          <line x1="0" y1="0" x2="0" y2="82" stroke="#0a0503" stroke-width="22" stroke-linecap="round"/>
          <line x1="0" y1="3" x2="0" y2="79" stroke="#583a22" stroke-width="17" stroke-linecap="round"/>
          <line x1="-3.6" y1="8" x2="-3.6" y2="68" stroke="#947048" stroke-width="1.8" stroke-linecap="round" opacity="0.48"/>
          <ellipse cx="0" cy="30" rx="9.5" ry="2.8" fill="none" stroke="#0a0503" stroke-width="1.5" opacity="0.72"/>
          <ellipse cx="0" cy="60" rx="9.5" ry="2.8" fill="none" stroke="#0a0503" stroke-width="1.5" opacity="0.72"/>
          <!-- weathering chip -->
          <path d="M 5 40 Q 6.5 43 4 46" stroke="#0a0503" stroke-width="1.5" fill="none" opacity="0.55"/>
          <circle cx="4.5" cy="44" r="1.2" fill="#0a0503" opacity="0.45"/>
          <circle cx="0" cy="85" r="10" fill="#0a0503"/>
          <circle cx="0" cy="85" r="6.8" fill="#3d2718"/>
          <circle cx="-1.8" cy="83" r="1.8" fill="#7a5432" opacity="0.7"/>
          <g class="knee" transform="translate(0 85)">
            <line x1="0" y1="0" x2="0" y2="82" stroke="#0a0503" stroke-width="19" stroke-linecap="round"/>
            <line x1="0" y1="3" x2="0" y2="79" stroke="#583a22" stroke-width="14" stroke-linecap="round"/>
            <line x1="-2.8" y1="8" x2="-2.8" y2="68" stroke="#947048" stroke-width="1.6" stroke-linecap="round" opacity="0.48"/>
            <ellipse cx="0" cy="28" rx="8.5" ry="2.5" fill="none" stroke="#0a0503" stroke-width="1.3" opacity="0.72"/>
            <ellipse cx="0" cy="58" rx="8.5" ry="2.5" fill="none" stroke="#0a0503" stroke-width="1.3" opacity="0.72"/>
            <circle cx="0" cy="85" r="8" fill="#0a0503"/>
            <circle cx="0" cy="85" r="5.3" fill="#3d2718"/>
            <circle cx="-1.3" cy="83.5" r="1.3" fill="#7a5432" opacity="0.7"/>
            <!-- FR hand: noticeably smaller than FL -->
            <g class="foot" transform="translate(0 85)">
              <polygon points="-11,-2 -17,14 -4,11"  fill="#2a1a0d" stroke="#0a0503" stroke-width="1.3"/>
              <polygon points="0,-2 -4,17 4,17"       fill="#2a1a0d" stroke="#0a0503" stroke-width="1.3"/>
              <polygon points="11,-2 17,14 4,11"      fill="#2a1a0d" stroke="#0a0503" stroke-width="1.3"/>
            </g>
          </g>
        </g>
      </g>
    </svg>
  </section>

  <!-- ========= Simon-style memory game UI ========= -->
  <section class="memory" aria-label="メモリーゲーム">
    <div class="status-row">
      <div class="status-pill" id="status">—</div>
      <div class="round-pill"><span data-i18n="round">ROUND</span> <span id="round">—</span></div>
      <div class="round-pill"><span data-i18n="best">BEST</span> <span id="best">0</span></div>
    </div>

    <div class="tank-row" aria-label="燃料タンク">
      <span class="tank-label" data-i18n="fuelLabel">燃料</span>
      <div class="tanks" id="tanks"></div>
    </div>

    <div class="sequence-progress" id="sequence-progress" aria-label="このラウンドのポーズ数"></div>

    <div class="pad-wrap">
      <div class="pad-grid">
        <button class="pad" data-dir="2" aria-label="上">↑</button>
        <button class="pad" data-dir="0" aria-label="左">←</button>
        <button class="pad" data-dir="3" aria-label="右">→</button>
        <button class="pad" data-dir="1" aria-label="下">↓</button>
      </div>
    </div>

  </section>
</main>

<!-- ========= Main menu modal ========= -->
<div class="menu-modal show" id="menu-modal" aria-hidden="false" role="dialog" aria-labelledby="menu-title">
  <div class="menu-card">
    <button class="modal-close-x" id="menu-close-x" aria-label="close">×</button>
    <p class="menu-sub">PROJECT HAIL MARY</p>
    <h2 class="menu-title" id="menu-title" data-i18n="menuTitle">メインメニュー</h2>

    <div class="menu-section">
      <div class="menu-section-label" data-i18n="menuLanguage">言語</div>
      <div class="lang-switch">
        <button class="lang-btn" data-lang="ja">日本語</button>
        <button class="lang-btn" data-lang="en">English</button>
      </div>
    </div>

    <div class="menu-section">
      <div class="menu-section-label" data-i18n="mode">モード</div>
      <div class="mode-switch">
        <button class="mode-btn" data-mode="normal" data-i18n="modeNormal">ふつう</button>
        <button class="mode-btn" data-mode="endless" data-i18n="modeEndless">エンドレス</button>
      </div>
    </div>

    <div class="menu-actions">
      <button class="btn ghost   menu-action-btn" id="menu-practice" data-i18n="menuPractice">練習する</button>
      <button class="btn primary menu-action-btn" id="menu-start"    data-i18n="menuStart">本番開始</button>
    </div>
  </div>
</div>

<!-- ========= Result modal ========= -->
<div class="result-modal" id="result-modal" aria-hidden="true" role="dialog" aria-labelledby="result-title">
  <div class="result-card" role="document">
    <p class="result-sub">RESULT</p>
    <h2 class="result-title" id="result-title" data-i18n="resultTitle">異星間交友の結果</h2>

    <div class="result-stats">
      <div class="result-stat">
        <span class="result-stat-label" data-i18n="reachedRound">到達ラウンド</span>
        <span class="result-stat-value" id="result-round">—</span>
      </div>
      <div class="result-stat">
        <span class="result-stat-label" data-i18n="bestLabel">ベスト</span>
        <span class="result-stat-value" id="result-best">—</span>
      </div>
    </div>

    <div class="result-friendship-label" data-i18n="friendshipLabel">友情レベル</div>
    <div class="result-friendship" id="result-friendship">★ ☆ ☆ ☆ ☆</div>
    <p class="result-message" id="result-message"></p>

    <div class="result-actions">
      <button class="btn ghost"   id="result-close" data-i18n="close">閉じる</button>
      <button class="btn primary" id="result-retry" data-i18n="retry">もう一度</button>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
