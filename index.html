<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5本足のいきもの トランポリン</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { border: 2px solid #444; cursor: none; }
.info { color: #888; font-size: 13px; margin-top: 6px; }
.hud { color: #fff; font-family: monospace; font-size: 16px; margin-bottom: 4px; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="hud" id="hud"></div>
<canvas id="game"></canvas>
<div class="info" id="info"></div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 400, H = 300;
const PIX = 2;
canvas.width = W * PIX;
canvas.height = H * PIX;
const SCALE = Math.min((window.innerWidth - 40) / W, (window.innerHeight - 100) / H, 3);
canvas.style.width = (W * SCALE) + 'px';
canvas.style.height = (H * SCALE) + 'px';
ctx.scale(PIX, PIX);

const TOTAL = 30;
const COLS = 10, ROWS = 3;
const SEAT_ZONE_Y = 8;
const SEAT_W = 14, SEAT_H = 16;
const SEAT_MARGIN_X = (W - COLS * SEAT_W) / 2;
const ORGAN_Y = H - 22;
const SPAWN_Y = 100;

const MODES = {
  easy: {
    name: '\u5C0F\u8AAC\u7248', sub: 'EASY',
    gravityBase: 0.05, gravityWeight: 0.06,
    bounceBase: 8.5, bounceWeight: 1.5,
    trampolineW: 50, trampolineWMax: 80,
    seatMaxDist: 9999,
    seatVyMax: 0,
    unseatInterval: 0,
    spawnVx: 2,
    hitVxMult: 1.2
  },
  hard: {
    name: '\u6620\u753B\u7248', sub: 'HARD',
    gravityBase: 0.06, gravityWeight: 0.08,
    bounceBase: 7.8, bounceWeight: 1.8,
    trampolineW: 40, trampolineWMax: 60,
    seatMaxDist: 18,
    seatVyMax: -1.5,
    unseatInterval: 180,
    spawnVx: 3,
    hitVxMult: 1.8
  }
};

let gameState = 'title';
let cfg = null;
let students = [];
let seats = [];
let notes = [];
let seatedCount = 0;
let frame = 0;
let cleared = false;
let mouseX = W / 2;
let keys = {};
let clearPhase = 0;
let ripples = [];
let celebNotes = [];
let teacherX = W + 30;
let canRestart = false;
let titleHover = null;
let unseatTimer = 0;

const trampoline = { x: W / 2, w: 50, speedBoost: 0, bounceBoost: 0 };

let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSE(type) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);
  if (type === 'bounce') {
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(600, t);
    o.frequency.exponentialRampToValueAtTime(1200, t + 0.08);
    o.frequency.exponentialRampToValueAtTime(800, t + 0.15);
    o.connect(g); o.start(t); o.stop(t + 0.15);
  } else if (type === 'seat') {
    [523, 659, 784].forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      o.type = 'sine'; o.frequency.value = freq;
      const sg = audioCtx.createGain();
      sg.gain.setValueAtTime(0, t + i * 0.06);
      sg.gain.linearRampToValueAtTime(0.08, t + i * 0.06 + 0.02);
      sg.gain.exponentialRampToValueAtTime(0.001, t + i * 0.06 + 0.2);
      o.connect(sg); sg.connect(audioCtx.destination);
      o.start(t + i * 0.06); o.stop(t + i * 0.06 + 0.2);
    });
  } else if (type === 'item') {
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    const o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.setValueAtTime(880, t);
    o.frequency.exponentialRampToValueAtTime(1760, t + 0.1);
    o.connect(g); o.start(t); o.stop(t + 0.2);
  } else if (type === 'victory') {
    [523, 659, 784, 1047].forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      o.type = 'sine';
      const sg = audioCtx.createGain();
      sg.gain.setValueAtTime(0, t + i * 0.12);
      sg.gain.linearRampToValueAtTime(0.1, t + i * 0.12 + 0.03);
      sg.gain.exponentialRampToValueAtTime(0.001, t + i * 0.12 + 0.5);
      o.frequency.value = freq;
      o.connect(sg); sg.connect(audioCtx.destination);
      o.start(t + i * 0.12); o.stop(t + i * 0.12 + 0.5);
    });
  } else if (type === 'organ') {
    [262, 330, 392, 523, 330, 392, 523, 659].forEach((freq, i) => {
      const o = audioCtx.createOscillator(); o.type = 'sine';
      const o2 = audioCtx.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq * 2;
      const sg = audioCtx.createGain();
      sg.gain.setValueAtTime(0, t + i * 0.25);
      sg.gain.linearRampToValueAtTime(0.06, t + i * 0.25 + 0.05);
      sg.gain.exponentialRampToValueAtTime(0.001, t + i * 0.25 + 0.4);
      const sg2 = audioCtx.createGain();
      sg2.gain.setValueAtTime(0, t + i * 0.25);
      sg2.gain.linearRampToValueAtTime(0.02, t + i * 0.25 + 0.05);
      sg2.gain.exponentialRampToValueAtTime(0.001, t + i * 0.25 + 0.35);
      o.frequency.value = freq;
      o.connect(sg); sg.connect(audioCtx.destination);
      o2.connect(sg2); sg2.connect(audioCtx.destination);
      o.start(t + i * 0.25); o.stop(t + i * 0.25 + 0.4);
      o2.start(t + i * 0.25); o2.stop(t + i * 0.25 + 0.35);
    });
  } else if (type === 'unseat') {
    g.gain.setValueAtTime(0.08, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    const o = audioCtx.createOscillator();
    o.type = 'square';
    o.frequency.setValueAtTime(400, t);
    o.frequency.exponentialRampToValueAtTime(200, t + 0.15);
    o.connect(g); o.start(t); o.stop(t + 0.2);
  }
}

const NOTE_DEFS = [
  { type: 'speed',  symbol: '\u266A', color: '#88ccff' },
  { type: 'bounce', symbol: '\u266C', color: '#88ff88' },
  { type: 'wide',   symbol: '\u266B', color: '#ff88cc' }
];

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
}

function generateStudents() {
  students = [];
  for (let i = 0; i < TOTAL; i++) {
    const weight = 0.3 + Math.random() * 0.7;
    const sizeScale = 0.6 + weight * 0.5;
    const hue = Math.random() * 360;
    const sat = 15 + Math.random() * 25;
    const lit = 75 - weight * 25;
    const [r, g, b] = hslToRgb(hue, sat, lit);
    students.push({
      weight, sizeScale, hue,
      color: `rgb(${r},${g},${b})`,
      noteColor: `rgb(${Math.min(255,r+40)},${Math.min(255,g+40)},${Math.min(255,b+40)})`,
      gravity: cfg.gravityBase + weight * cfg.gravityWeight,
      bouncePower: cfg.bounceBase - weight * cfg.bounceWeight,
      seated: false, seatTime: 0,
      x: 0, y: 0, vx: 0, vy: 0,
      legPhase: Math.random() * 6,
      rotation: 0, active: false
    });
  }
}

function initSeats() {
  seats = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      seats.push({
        x: SEAT_MARGIN_X + c * SEAT_W + SEAT_W / 2,
        y: SEAT_ZONE_Y + r * SEAT_H + SEAT_H / 2,
        occupied: false, student: null
      });
    }
  }
}

function spawnAll() {
  for (let i = 0; i < TOTAL; i++) {
    const s = students[i];
    s.x = 20 + Math.random() * (W - 40);
    s.y = SPAWN_Y + Math.random() * 80;
    s.vx = (Math.random() - 0.5) * cfg.spawnVx;
    s.vy = Math.random() * -1;
    s.rotation = 0;
    s.active = true;
    s.seated = false;
  }
}

function spawnNote(seat, student) {
  const def = NOTE_DEFS[Math.floor(Math.random() * NOTE_DEFS.length)];
  notes.push({
    x: seat.x, y: seat.y + 10,
    vy: 0.3 + Math.random() * 0.2,
    type: def.type, symbol: def.symbol, color: def.color,
    alive: true, age: 0
  });
}

function unseatStudent() {
  const seatedSeats = seats.filter(s => s.occupied && s.student);
  if (seatedSeats.length <= 5) return;
  const seat = seatedSeats[Math.floor(Math.random() * seatedSeats.length)];
  const s = seat.student;
  seat.occupied = false;
  seat.student = null;
  s.seated = false;
  s.active = true;
  s.x = seat.x;
  s.y = seat.y + 10;
  s.vy = 2 + Math.random() * 2;
  s.vx = (Math.random() - 0.5) * 4;
  s.rotation = 0;
  s.legPhase = 0;
  seatedCount--;
  playSE('unseat');
}

function startGame(modeKey) {
  cfg = MODES[modeKey];
  gameState = 'game';
  cleared = false;
  clearPhase = 0;
  ripples = [];
  celebNotes = [];
  teacherX = W + 30;
  canRestart = false;
  unseatTimer = 0;
  notes = [];
  seatedCount = 0;
  frame = 0;
  trampoline.speedBoost = 0;
  trampoline.bounceBoost = 0;
  trampoline.w = cfg.trampolineW;
  generateStudents();
  initSeats();
  spawnAll();
  document.getElementById('info').textContent = '\u2190 \u2192 or mouse to move organ';
}

function drawCreature(x, y, phase, rot, color, scale) {
  ctx.save();
  ctx.translate(Math.round(x), Math.round(y));
  ctx.rotate(rot);
  ctx.scale(scale, scale);
  ctx.fillStyle = color;
  ctx.fillRect(-4, -3, 8, 6);
  ctx.fillRect(-3, -4, 6, 8);
  ctx.fillStyle = '#000';
  ctx.fillRect(1, -2, 2, 2);
  const legAngles = [-2.2, -1.1, 0, 1.1, 2.2];
  for (let i = 0; i < 5; i++) {
    const swing = Math.sin(phase + i * 1.3) * 0.4;
    const angle = legAngles[i] + swing;
    const lx = Math.round(Math.sin(angle) * 6);
    const ly = Math.round(Math.cos(angle) * 6);
    ctx.fillStyle = color;
    ctx.fillRect(lx - 1, ly + 1, 2, 2);
    ctx.fillRect(Math.round(Math.sin(angle) * 3), Math.round(Math.cos(angle) * 3) + 1, 1, 1);
  }
  ctx.restore();
}

function drawSeatedCreature(x, y, color, scale, shake) {
  ctx.save();
  const sx = shake ? (Math.random() - 0.5) * 2.5 : 0;
  const sy = shake ? (Math.random() - 0.5) * 1.5 : 0;
  ctx.translate(Math.round(x + sx), Math.round(y + sy));
  ctx.scale(scale, scale);
  ctx.fillStyle = color;
  ctx.fillRect(-4, -3, 8, 6);
  ctx.fillRect(-3, -4, 6, 8);
  ctx.fillStyle = '#000';
  ctx.fillRect(1, -2, 2, 2);
  if (shake) { ctx.fillRect(-2, 1, 1, 1); ctx.fillRect(0, 1, 2, 1); }
  const legAngles = [-1.8, -0.9, 0, 0.9, 1.8];
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.round(Math.sin(legAngles[i]) * 5) - 1, 5, 2, 2);
  }
  ctx.restore();
}

function drawNote(note) {
  if (!note.alive) return;
  ctx.save();
  ctx.fillStyle = note.color;
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(note.symbol, note.x + Math.sin(note.age * 0.08) * 1.5, note.y);
  ctx.restore();
}

function drawSeatZone() {
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, SEAT_ZONE_Y + ROWS * SEAT_H + 4);
  ctx.fillStyle = '#333';
  ctx.fillRect(0, SEAT_ZONE_Y + ROWS * SEAT_H + 3, W, 1);
  const shaking = cleared && clearPhase > 150;
  for (const seat of seats) {
    if (seat.occupied && seat.student) {
      drawSeatedCreature(seat.x, seat.y, seat.student.color, seat.student.sizeScale, shaking);
    } else {
      ctx.fillStyle = '#222';
      ctx.fillRect(seat.x - 5, seat.y - 5, 10, 10);
      ctx.fillStyle = '#333';
      ctx.fillRect(seat.x - 4, seat.y - 4, 8, 8);
    }
  }
}

function drawOrgan() {
  const cx = Math.round(trampoline.x);
  const w = Math.round(trampoline.w);
  const tx = cx - Math.floor(w / 2);
  const ty = ORGAN_Y;
  ctx.fillStyle = '#3a2515';
  ctx.fillRect(tx - 3, ty - 3, w + 6, 13);
  ctx.fillStyle = '#4a3520';
  ctx.fillRect(tx - 1, ty - 1, w + 2, 10);
  const keyW = 4;
  const numKeys = Math.floor(w / keyW);
  const keysX = tx + (w - numKeys * keyW) / 2;
  const hasBoost = trampoline.bounceBoost > 0 || trampoline.speedBoost > 0 || trampoline.w > cfg.trampolineW;
  for (let i = 0; i < numKeys; i++) {
    const glow = hasBoost && Math.sin(frame * 0.2 + i) > 0.5;
    ctx.fillStyle = glow ? '#fff8e0' : '#f0e8d8';
    ctx.fillRect(keysX + i * keyW, ty, keyW - 1, 7);
  }
  const blackKey = [1, 1, 0, 1, 1, 1, 0];
  for (let i = 0; i < numKeys - 1; i++) {
    if (blackKey[i % 7]) {
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(keysX + i * keyW + keyW - 1, ty, 2, 4);
    }
  }
  ctx.fillStyle = '#3a2515';
  ctx.fillRect(tx, ty + 9, 2, 5);
  ctx.fillRect(tx + w - 2, ty + 9, 2, 5);
}

function drawTeacher(x, y, playing) {
  ctx.save();
  ctx.translate(Math.round(x), Math.round(y));
  ctx.fillStyle = '#f0c830';
  ctx.fillRect(-4, -14, 8, 5);
  ctx.fillRect(-5, -12, 10, 3);
  ctx.fillStyle = '#f5d0a0';
  ctx.fillRect(-3, -9, 6, 5);
  ctx.fillStyle = '#333';
  ctx.fillRect(-2, -8, 1, 1);
  ctx.fillRect(1, -8, 1, 1);
  ctx.fillStyle = '#c08060';
  ctx.fillRect(-1, -6, 2, 1);
  ctx.fillStyle = '#2a2a4a';
  ctx.fillRect(-4, -4, 8, 8);
  const armOfs = playing ? Math.sin(frame * 0.15) * 1.5 : 0;
  ctx.fillStyle = '#f5d0a0';
  ctx.fillRect(-7, -2 + armOfs, 3, 2);
  ctx.fillRect(4, -2 - armOfs, 3, 2);
  ctx.restore();
}

function drawSpeechBubble(x, y, text) {
  ctx.save();
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const tw = ctx.measureText(text).width;
  const bw = tw + 14, bh = 18;
  const bx = x - bw / 2, by = y - bh - 8;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 3); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x - 3, by + bh); ctx.lineTo(x + 3, by + bh); ctx.lineTo(x, by + bh + 5); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.fillText(text, x, by + bh / 2);
  ctx.restore();
}

function drawRipples() {
  for (const r of ripples) {
    ctx.save(); ctx.globalAlpha = r.alpha;
    ctx.strokeStyle = r.color || '#fff'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }
}

function drawCelebNotes() {
  for (const n of celebNotes) {
    ctx.save(); ctx.globalAlpha = n.alpha;
    ctx.fillStyle = n.color; ctx.font = '8px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(n.symbol, n.x, n.y);
    ctx.restore();
  }
}

function drawPowerUps() {
  ctx.save();
  const y = H - 8;
  ctx.font = '7px monospace'; ctx.textAlign = 'left';
  let xOff = 4;
  if (trampoline.bounceBoost > 0) { ctx.fillStyle = '#88ff88'; ctx.fillText('BOUNCE+', xOff, y); xOff += 50; }
  if (trampoline.speedBoost > 0) { ctx.fillStyle = '#88ccff'; ctx.fillText('SPEED+', xOff, y); xOff += 48; }
  if (trampoline.w > cfg.trampolineW) { ctx.fillStyle = '#ff88cc'; ctx.fillText('WIDE+', xOff, y); }
  ctx.restore();
}

function findNearestEmptySeat(x, y, maxDist) {
  let best = null, bestDist = Infinity;
  for (const seat of seats) {
    if (seat.occupied) continue;
    const dx = seat.x - x, dy = seat.y - y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < bestDist && d < maxDist) { bestDist = d; best = seat; }
  }
  return best;
}

function updateClearAnimation() {
  clearPhase++;
  trampoline.x += (W / 2 - trampoline.x) * 0.05;
  if (clearPhase > 30) teacherX += (W / 2 - teacherX) * 0.04;
  if (clearPhase === 150) playSE('organ');
  if (clearPhase > 150) {
    if (clearPhase % 10 === 0) {
      const seat = seats[Math.floor(Math.random() * seats.length)];
      if (seat.occupied) ripples.push({ x: seat.x, y: seat.y, r: 1, alpha: 0.5, color: seat.student.noteColor });
    }
    if (clearPhase % 7 === 0) {
      const seat = seats[Math.floor(Math.random() * seats.length)];
      if (seat.occupied) {
        const syms = ['\u266A', '\u266B', '\u266C', '\u2669'];
        celebNotes.push({ x: seat.x + (Math.random() - 0.5) * 8, y: seat.y - 4,
          vy: -0.3 - Math.random() * 0.4, vx: (Math.random() - 0.5) * 0.3,
          symbol: syms[Math.floor(Math.random() * syms.length)], alpha: 1, color: seat.student.noteColor });
      }
    }
    if (clearPhase % 12 === 0) {
      const syms = ['\u266A', '\u266B', '\u266C'];
      celebNotes.push({ x: trampoline.x + (Math.random() - 0.5) * trampoline.w * 0.8, y: ORGAN_Y - 8,
        vy: -0.6 - Math.random() * 0.5, vx: (Math.random() - 0.5) * 0.5,
        symbol: syms[Math.floor(Math.random() * syms.length)], alpha: 1,
        color: `hsl(${Math.random() * 60 + 30}, 80%, 70%)` });
    }
  }
  for (const r of ripples) { r.r += 0.35; r.alpha -= 0.012; }
  ripples = ripples.filter(r => r.alpha > 0);
  for (const n of celebNotes) { n.y += n.vy; n.x += n.vx; n.alpha -= 0.006; }
  celebNotes = celebNotes.filter(n => n.alpha > 0);
  if (clearPhase > 350) canRestart = true;
}

function update() {
  if (gameState === 'title') { frame++; return; }
  frame++;
  if (cleared) { updateClearAnimation(); return; }

  if (trampoline.speedBoost > 0) trampoline.speedBoost -= 0.003;
  if (trampoline.bounceBoost > 0) trampoline.bounceBoost -= 0.003;
  if (trampoline.w > cfg.trampolineW) trampoline.w = Math.max(cfg.trampolineW, trampoline.w - 0.02);

  const baseSpeed = 5 + trampoline.speedBoost * 8;
  if (keys['ArrowLeft'] || keys['a']) mouseX = trampoline.x - baseSpeed;
  if (keys['ArrowRight'] || keys['d']) mouseX = trampoline.x + baseSpeed;
  trampoline.x += (mouseX - trampoline.x) * (0.25 + trampoline.speedBoost * 0.15);
  trampoline.x = Math.max(trampoline.w / 2, Math.min(W - trampoline.w / 2, trampoline.x));
  const tx1 = trampoline.x - trampoline.w / 2;
  const tx2 = trampoline.x + trampoline.w / 2;
  const seatZoneBottom = SEAT_ZONE_Y + ROWS * SEAT_H + 4;

  for (const s of students) {
    if (!s.active || s.seated) continue;
    s.vy += s.gravity;
    s.x += s.vx;
    s.y += s.vy;
    s.legPhase += 0.2;
    s.rotation += s.vx * 0.015;
    const r = 6 * s.sizeScale;
    if (s.x < r) { s.x = r; s.vx = Math.abs(s.vx); }
    if (s.x > W - r) { s.x = W - r; s.vx = -Math.abs(s.vx); }
    if (s.y - r <= seatZoneBottom && s.vy < cfg.seatVyMax) {
      const seat = findNearestEmptySeat(s.x, s.y, cfg.seatMaxDist);
      if (seat) {
        seat.occupied = true;
        seat.student = s;
        s.seated = true;
        s.active = false;
        s.seatTime = frame;
        seatedCount++;
        playSE('seat');
        if (seatedCount >= TOTAL) { cleared = true; playSE('victory'); }
        continue;
      }
    }
    if (s.y < r) { s.y = r; s.vy = Math.abs(s.vy) * 0.3; }
    if (s.vy > 0 && s.y + r >= ORGAN_Y && s.y + r <= ORGAN_Y + 14 &&
        s.x >= tx1 - 4 && s.x <= tx2 + 4) {
      const bounce = s.bouncePower + trampoline.bounceBoost * 3;
      s.vy = -bounce;
      s.y = ORGAN_Y - r;
      s.vx += ((s.x - trampoline.x) / (trampoline.w / 2)) * cfg.hitVxMult;
      s.vx = Math.max(-4, Math.min(4, s.vx));
      s.legPhase = 0;
      playSE('bounce');
    }
    if (s.y > H + 30) {
      s.x = 20 + Math.random() * (W - 40);
      s.y = SPAWN_Y + Math.random() * 40;
      s.vx = (Math.random() - 0.5) * cfg.spawnVx;
      s.vy = 0;
      s.rotation = 0;
    }
  }

  // HARD: seated students occasionally jump out
  if (cfg.unseatInterval > 0 && seatedCount > 5 && !cleared) {
    unseatTimer++;
    if (unseatTimer >= cfg.unseatInterval) {
      unseatTimer = 0;
      unseatStudent();
    }
  }

  if (seatedCount > 0 && frame % 90 === 0) {
    const seated = students.filter(s => s.seated);
    if (seated.length > 0) {
      const s = seated[Math.floor(Math.random() * seated.length)];
      const seat = seats.find(st => st.student === s);
      if (seat) spawnNote(seat, s);
    }
  }

  for (const n of notes) {
    if (!n.alive) continue;
    n.y += n.vy;
    n.age++;
    if (n.y >= ORGAN_Y - 2 && n.y <= ORGAN_Y + 8 && n.x >= tx1 - 2 && n.x <= tx2 + 2) {
      n.alive = false;
      playSE('item');
      if (n.type === 'speed') trampoline.speedBoost = Math.min(1, trampoline.speedBoost + 0.5);
      else if (n.type === 'bounce') trampoline.bounceBoost = Math.min(1, trampoline.bounceBoost + 0.5);
      else if (n.type === 'wide') trampoline.w = Math.min(cfg.trampolineWMax, trampoline.w + 10);
    }
    if (n.y > H + 10) n.alive = false;
  }
  notes = notes.filter(n => n.alive);
}

// === TITLE SCREEN ===

const BTN_Y = 170;
const BTN_W = 130, BTN_H = 40, BTN_GAP = 20;
const BTN_EASY_X = W / 2 - BTN_W - BTN_GAP / 2;
const BTN_HARD_X = W / 2 + BTN_GAP / 2;

function drawTitle() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // title creatures walking around
  const phase = frame * 0.05;
  for (let i = 0; i < 8; i++) {
    const cx = 30 + i * 45 + Math.sin(phase + i * 2) * 15;
    const cy = 80 + Math.sin(phase * 0.7 + i) * 10;
    const hue = i * 45;
    const [r, g, b] = hslToRgb(hue, 25, 65);
    drawCreature(cx, cy, phase * 4 + i, Math.sin(phase + i) * 0.2, `rgb(${r},${g},${b})`, 0.8);
  }

  ctx.save();
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText('5\u672C\u8DB3\u306E\u3044\u304D\u3082\u306E', W / 2, 30);
  ctx.font = 'bold 14px sans-serif';
  ctx.fillStyle = '#aaa';
  ctx.fillText('\u30C8\u30E9\u30F3\u30DD\u30EA\u30F3', W / 2, 52);

  // mode buttons
  const modes = [
    { key: 'easy', x: BTN_EASY_X, label: '\u5C0F\u8AAC\u7248', sub: 'EASY', color: '#4a6' },
    { key: 'hard', x: BTN_HARD_X, label: '\u6620\u753B\u7248', sub: 'HARD', color: '#a44' }
  ];

  for (const m of modes) {
    const hover = titleHover === m.key;
    ctx.fillStyle = hover ? m.color : '#222';
    ctx.strokeStyle = m.color;
    ctx.lineWidth = hover ? 2 : 1;
    ctx.beginPath();
    ctx.roundRect(m.x, BTN_Y, BTN_W, BTN_H, 4);
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px sans-serif';
    ctx.fillText(m.label, m.x + BTN_W / 2, BTN_Y + 15);
    ctx.font = '10px sans-serif';
    ctx.fillStyle = hover ? '#fff' : '#888';
    ctx.fillText(m.sub, m.x + BTN_W / 2, BTN_Y + 30);
  }

  // description
  ctx.font = '9px sans-serif';
  ctx.fillStyle = '#666';
  ctx.fillText('\u5C0F\u8AAC\u7248: \u304A\u624B\u8EFD\u306B\u904A\u3079\u308B', W / 2, BTN_Y + BTN_H + 18);
  ctx.fillText('\u6620\u753B\u7248: \u751F\u5F92\u304C\u5E2D\u304B\u3089\u98DB\u3073\u51FA\u3059\u3001\u7740\u5E2D\u5224\u5B9A\u304D\u3073\u3057\u3081', W / 2, BTN_Y + BTN_H + 32);

  ctx.font = '8px sans-serif';
  ctx.fillStyle = '#555';
  ctx.fillText('click to select / 1: \u5C0F\u8AAC\u7248  2: \u6620\u753B\u7248', W / 2, H - 15);
  ctx.restore();
}

function draw() {
  if (gameState === 'title') {
    drawTitle();
    document.getElementById('hud').textContent = '';
    return;
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  drawSeatZone();
  drawOrgan();
  if (!cleared) { for (const n of notes) drawNote(n); }
  for (const s of students) {
    if (s.active && !s.seated) drawCreature(s.x, s.y, s.legPhase, s.rotation, s.color, s.sizeScale);
  }
  if (!cleared) drawPowerUps();
  if (cleared) {
    drawRipples();
    drawCelebNotes();
    if (clearPhase > 30) drawTeacher(teacherX, ORGAN_Y - 6, clearPhase > 150);
    if (clearPhase > 90 && clearPhase < 300) {
      ctx.save();
      const a = clearPhase < 110 ? (clearPhase - 90) / 20 : clearPhase > 270 ? (300 - clearPhase) / 30 : 1;
      ctx.globalAlpha = Math.max(0, Math.min(1, a));
      drawSpeechBubble(teacherX, ORGAN_Y - 22, '\u6388\u696D\u304C\u59CB\u307E\u308B\u3088\uFF01');
      ctx.restore();
    }
    if (canRestart) {
      ctx.save();
      ctx.fillStyle = '#fff'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
      ctx.globalAlpha = 0.5 + Math.sin(frame * 0.08) * 0.3;
      ctx.fillText('click / enter to play again', W / 2, H / 2 + 50);
      ctx.restore();
    }
  }

  // mode indicator
  ctx.save();
  ctx.font = '7px monospace'; ctx.textAlign = 'right';
  ctx.fillStyle = cfg === MODES.hard ? '#a44' : '#4a6';
  ctx.fillText(cfg.name, W - 4, H - 2);
  ctx.restore();

  document.getElementById('hud').textContent = cleared
    ? 'ALL SEATED!'
    : `SEATED: ${seatedCount} / ${TOTAL}`;
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

// === INPUT ===

function getTitleButton(mx, my) {
  if (my >= BTN_Y && my <= BTN_Y + BTN_H) {
    if (mx >= BTN_EASY_X && mx <= BTN_EASY_X + BTN_W) return 'easy';
    if (mx >= BTN_HARD_X && mx <= BTN_HARD_X + BTN_W) return 'hard';
  }
  return null;
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / SCALE;
  const my = (e.clientY - rect.top) / SCALE;
  if (gameState === 'title') {
    titleHover = getTitleButton(mx, my);
    canvas.style.cursor = titleHover ? 'pointer' : 'default';
  } else {
    mouseX = mx;
    canvas.style.cursor = 'none';
  }
});

canvas.addEventListener('click', e => {
  initAudio();
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / SCALE;
  const my = (e.clientY - rect.top) / SCALE;
  if (gameState === 'title') {
    const btn = getTitleButton(mx, my);
    if (btn) startGame(btn);
  } else if (canRestart) {
    gameState = 'title';
    canvas.style.cursor = 'default';
  }
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) / SCALE;
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  const rect = canvas.getBoundingClientRect();
  const mx = (e.touches[0].clientX - rect.left) / SCALE;
  const my = (e.touches[0].clientY - rect.top) / SCALE;
  if (gameState === 'title') {
    const btn = getTitleButton(mx, my);
    if (btn) startGame(btn);
  } else {
    mouseX = mx;
    if (canRestart) { gameState = 'title'; canvas.style.cursor = 'default'; }
  }
}, { passive: false });

document.addEventListener('keydown', e => {
  initAudio();
  keys[e.key] = true;
  if (gameState === 'title') {
    if (e.key === '1') startGame('easy');
    if (e.key === '2') startGame('hard');
  } else if (canRestart && (e.key === ' ' || e.key === 'Enter')) {
    gameState = 'title';
    canvas.style.cursor = 'default';
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

document.getElementById('info').textContent = '1: \u5C0F\u8AAC\u7248  2: \u6620\u753B\u7248';
loop();
</script>
</body>
