<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5本足のいきもの トランポリン</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
canvas { border: 2px solid #444; image-rendering: pixelated; cursor: none; }
.info { color: #888; font-family: monospace; font-size: 13px; margin-top: 6px; }
.hud { color: #fff; font-family: monospace; font-size: 16px; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="hud" id="hud">SEATED: 0 / 30</div>
<canvas id="game" width="400" height="300"></canvas>
<div class="info">← → or mouse to move trampoline</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 400, H = 300;
const SCALE = Math.min((window.innerWidth - 40) / W, (window.innerHeight - 100) / H, 3);
canvas.style.width = (W * SCALE) + 'px';
canvas.style.height = (H * SCALE) + 'px';

const TOTAL = 30;
const COLS = 10, ROWS = 3;
const SEAT_ZONE_Y = 8;
const SEAT_W = 14, SEAT_H = 16;
const SEAT_MARGIN_X = (W - COLS * SEAT_W) / 2;
const TRAMPOLINE_Y = H - 22;
const SPAWN_Y = 100;

let students = [];
let seats = [];
let notes = [];
let seatedCount = 0;
let frame = 0;
let cleared = false;
let mouseX = W / 2;
let keys = {};

const trampoline = { x: W / 2, w: 50, speedBoost: 0, bounceBoost: 0 };

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
}

function generateStudents() {
  students = [];
  for (let i = 0; i < TOTAL; i++) {
    const weight = 0.3 + Math.random() * 0.7;
    const sizeScale = 0.6 + weight * 0.5;
    const hue = Math.random() * 360;
    const sat = 15 + Math.random() * 25;
    const lit = 75 - weight * 25;
    const [r, g, b] = hslToRgb(hue, sat, lit);
    students.push({
      weight,
      sizeScale,
      color: `rgb(${r},${g},${b})`,
      noteColor: `rgb(${Math.min(255, r + 40)},${Math.min(255, g + 40)},${Math.min(255, b + 40)})`,
      hue,
      gravity: 0.05 + weight * 0.06,
      bouncePower: 8.5 - weight * 1.5,
      seated: false,
      seatTime: 0,
      noteDropped: false,
      x: 0, y: 0, vx: 0, vy: 0,
      legPhase: Math.random() * 6,
      rotation: 0,
      active: false
    });
  }
}

function initSeats() {
  seats = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      seats.push({
        x: SEAT_MARGIN_X + c * SEAT_W + SEAT_W / 2,
        y: SEAT_ZONE_Y + r * SEAT_H + SEAT_H / 2,
        occupied: false,
        student: null
      });
    }
  }
}

function spawnAll() {
  for (let i = 0; i < TOTAL; i++) {
    const s = students[i];
    s.x = 20 + Math.random() * (W - 40);
    s.y = SPAWN_Y + Math.random() * 80;
    s.vx = (Math.random() - 0.5) * 2;
    s.vy = Math.random() * -1;
    s.rotation = 0;
    s.active = true;
  }
}

function spawnNote(seat, student) {
  const types = ['speed', 'bounce', 'wide'];
  const type = types[Math.floor(Math.random() * types.length)];
  notes.push({
    x: seat.x,
    y: seat.y + 10,
    vy: 0.6 + Math.random() * 0.4,
    type,
    color: student.noteColor,
    alive: true,
    age: 0
  });
}

function restart() {
  generateStudents();
  initSeats();
  notes = [];
  seatedCount = 0;
  cleared = false;
  trampoline.speedBoost = 0;
  trampoline.bounceBoost = 0;
  trampoline.w = 50;
  spawnAll();
}

function drawCreature(x, y, phase, rot, color, scale) {
  ctx.save();
  ctx.translate(Math.round(x), Math.round(y));
  ctx.rotate(rot);
  ctx.scale(scale, scale);

  ctx.fillStyle = color;
  ctx.fillRect(-4, -3, 8, 6);
  ctx.fillRect(-3, -4, 6, 8);

  ctx.fillStyle = '#000';
  ctx.fillRect(1, -2, 2, 2);

  const legAngles = [-2.2, -1.1, 0, 1.1, 2.2];
  for (let i = 0; i < 5; i++) {
    const swing = Math.sin(phase + i * 1.3) * 0.4;
    const angle = legAngles[i] + swing;
    const lx = Math.round(Math.sin(angle) * 6);
    const ly = Math.round(Math.cos(angle) * 6);
    ctx.fillStyle = color;
    ctx.fillRect(lx - 1, ly + 1, 2, 2);
    const mx = Math.round(Math.sin(angle) * 3);
    const my = Math.round(Math.cos(angle) * 3);
    ctx.fillRect(mx, my + 1, 1, 1);
  }

  ctx.restore();
}

function drawSeatedCreature(x, y, color, scale) {
  ctx.save();
  ctx.translate(Math.round(x), Math.round(y));
  ctx.scale(scale, scale);

  ctx.fillStyle = color;
  ctx.fillRect(-4, -3, 8, 6);
  ctx.fillRect(-3, -4, 6, 8);

  ctx.fillStyle = '#000';
  ctx.fillRect(1, -2, 2, 2);

  const legAngles = [-1.8, -0.9, 0, 0.9, 1.8];
  for (let i = 0; i < 5; i++) {
    const lx = Math.round(Math.sin(legAngles[i]) * 5);
    ctx.fillStyle = color;
    ctx.fillRect(lx - 1, 5, 2, 2);
  }

  ctx.restore();
}

function drawNote(note) {
  const x = Math.round(note.x);
  const y = Math.round(note.y);
  const blink = Math.sin(note.age * 0.15) > 0;
  if (!blink) return;

  ctx.fillStyle = note.color;
  // note shape: ♪
  ctx.fillRect(x, y - 4, 1, 6);
  ctx.fillRect(x - 2, y + 1, 3, 2);
  ctx.fillRect(x + 1, y - 4, 3, 1);
  ctx.fillRect(x + 3, y - 3, 1, 2);
}

function drawSeatZone() {
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, SEAT_ZONE_Y + ROWS * SEAT_H + 4);

  ctx.fillStyle = '#333';
  ctx.fillRect(0, SEAT_ZONE_Y + ROWS * SEAT_H + 3, W, 1);

  for (const seat of seats) {
    if (seat.occupied && seat.student) {
      drawSeatedCreature(seat.x, seat.y, seat.student.color, seat.student.sizeScale);
    } else {
      ctx.fillStyle = '#222';
      ctx.fillRect(seat.x - 5, seat.y - 5, 10, 10);
      ctx.fillStyle = '#333';
      ctx.fillRect(seat.x - 4, seat.y - 4, 8, 8);
    }
  }
}

function drawTrampoline() {
  const tx = Math.round(trampoline.x - trampoline.w / 2);
  const ty = TRAMPOLINE_Y;
  ctx.fillStyle = '#888';
  ctx.fillRect(tx + 2, ty + 3, 2, 5);
  ctx.fillRect(tx + trampoline.w - 4, ty + 3, 2, 5);

  const hasBoost = trampoline.bounceBoost > 0 || trampoline.speedBoost > 0;
  ctx.fillStyle = hasBoost ? '#ddf' : '#fff';
  ctx.fillRect(tx, ty, trampoline.w, 3);
  ctx.fillStyle = '#888';
  for (let i = 0; i < trampoline.w; i += 4) {
    ctx.fillRect(tx + i, ty + 1, 2, 1);
  }
}

function drawPowerUps() {
  const y = H - 8;
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  if (trampoline.bounceBoost > 0) {
    ctx.fillStyle = '#8f8';
    ctx.fillText('BOUNCE+', 4, y);
  }
  if (trampoline.speedBoost > 0) {
    ctx.fillStyle = '#88f';
    ctx.fillText('SPEED+', trampoline.bounceBoost > 0 ? 52 : 4, y);
  }
  if (trampoline.w > 50) {
    ctx.fillStyle = '#f88';
    const xOff = (trampoline.bounceBoost > 0 ? 48 : 0) + (trampoline.speedBoost > 0 ? 48 : 0);
    ctx.fillText('WIDE+', 4 + xOff, y);
  }
}

function findNearestEmptySeat(x, y) {
  let best = null, bestDist = Infinity;
  for (const seat of seats) {
    if (seat.occupied) continue;
    const dx = seat.x - x, dy = seat.y - y;
    const d = dx * dx + dy * dy;
    if (d < bestDist) { bestDist = d; best = seat; }
  }
  return best;
}

function update() {
  frame++;
  if (cleared) return;

  // decay power-ups
  if (trampoline.speedBoost > 0) trampoline.speedBoost -= 0.003;
  if (trampoline.bounceBoost > 0) trampoline.bounceBoost -= 0.003;
  if (trampoline.w > 50) trampoline.w = Math.max(50, trampoline.w - 0.02);

  const baseSpeed = 5 + trampoline.speedBoost * 8;
  if (keys['ArrowLeft'] || keys['a']) mouseX = trampoline.x - baseSpeed;
  if (keys['ArrowRight'] || keys['d']) mouseX = trampoline.x + baseSpeed;
  trampoline.x += (mouseX - trampoline.x) * (0.25 + trampoline.speedBoost * 0.15);
  trampoline.x = Math.max(trampoline.w / 2, Math.min(W - trampoline.w / 2, trampoline.x));

  const tx1 = trampoline.x - trampoline.w / 2;
  const tx2 = trampoline.x + trampoline.w / 2;
  const seatZoneBottom = SEAT_ZONE_Y + ROWS * SEAT_H + 4;

  // update students
  for (const s of students) {
    if (!s.active || s.seated) continue;

    s.vy += s.gravity;
    s.x += s.vx;
    s.y += s.vy;
    s.legPhase += 0.2;
    s.rotation += s.vx * 0.015;

    const r = 6 * s.sizeScale;

    if (s.x < r) { s.x = r; s.vx = Math.abs(s.vx); }
    if (s.x > W - r) { s.x = W - r; s.vx = -Math.abs(s.vx); }

    if (s.y - r <= seatZoneBottom && s.vy < 0) {
      const seat = findNearestEmptySeat(s.x, s.y);
      if (seat) {
        seat.occupied = true;
        seat.student = s;
        s.seated = true;
        s.active = false;
        s.seatTime = frame;
        seatedCount++;
        if (seatedCount >= TOTAL) cleared = true;
        continue;
      }
    }

    if (s.y < r) { s.y = r; s.vy = Math.abs(s.vy) * 0.3; }

    if (s.vy > 0 &&
        s.y + r >= TRAMPOLINE_Y &&
        s.y + r <= TRAMPOLINE_Y + 14 &&
        s.x >= tx1 - 4 && s.x <= tx2 + 4) {
      const bounce = s.bouncePower + trampoline.bounceBoost * 3;
      s.vy = -bounce;
      s.y = TRAMPOLINE_Y - r;
      const hitPos = (s.x - trampoline.x) / (trampoline.w / 2);
      s.vx += hitPos * 1.2;
      s.vx = Math.max(-4, Math.min(4, s.vx));
      s.legPhase = 0;
    }

    if (s.y > H + 30) {
      s.x = 20 + Math.random() * (W - 40);
      s.y = SPAWN_Y + Math.random() * 40;
      s.vx = (Math.random() - 0.5) * 2;
      s.vy = 0;
      s.rotation = 0;
    }
  }

  // seated students drop notes after a delay
  for (const s of students) {
    if (s.seated && !s.noteDropped && frame - s.seatTime > 60 + Math.random() * 120) {
      s.noteDropped = true;
      const seat = seats.find(st => st.student === s);
      if (seat) spawnNote(seat, s);
    }
  }

  // update notes
  for (const n of notes) {
    if (!n.alive) continue;
    n.y += n.vy;
    n.age++;

    // trampoline catches note
    if (n.y >= TRAMPOLINE_Y - 2 && n.y <= TRAMPOLINE_Y + 8 &&
        n.x >= tx1 - 2 && n.x <= tx2 + 2) {
      n.alive = false;
      if (n.type === 'speed') trampoline.speedBoost = Math.min(1, trampoline.speedBoost + 0.5);
      else if (n.type === 'bounce') trampoline.bounceBoost = Math.min(1, trampoline.bounceBoost + 0.5);
      else if (n.type === 'wide') trampoline.w = Math.min(80, trampoline.w + 10);
    }

    if (n.y > H + 10) n.alive = false;
  }
  notes = notes.filter(n => n.alive);
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  drawSeatZone();
  drawTrampoline();

  for (const n of notes) {
    drawNote(n);
  }

  for (const s of students) {
    if (s.active && !s.seated) {
      drawCreature(s.x, s.y, s.legPhase, s.rotation, s.color, s.sizeScale);
    }
  }

  drawPowerUps();

  const hudText = cleared
    ? `ALL SEATED! [click to play again]`
    : `SEATED: ${seatedCount} / ${TOTAL}`;
  document.getElementById('hud').textContent = hudText;

  if (cleared) {
    ctx.fillStyle = '#fff';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('ALL SEATED!', W / 2, H / 2 + 20);
    ctx.font = '8px monospace';
    ctx.fillText('click / enter to play again', W / 2, H / 2 + 36);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) / SCALE;
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) / SCALE;
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.touches[0].clientX - rect.left) / SCALE;
  if (cleared) restart();
}, { passive: false });
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (cleared && (e.key === ' ' || e.key === 'Enter')) restart();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('click', () => { if (cleared) restart(); });

restart();
loop();
</script>
</body>
</html>
